<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Jenderal92 • GitHub Archive — Devil's Fork</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Luckiest+Guy&family=VT323&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-body: #0d1117;
            --bg-card: #161b22;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --border: #30363d;
            --border-hover: #79c0ff;
            --input-bg: #161b22;
            --btn-bg: #21262d;
            --btn-hover: #30363d;
            --accent: #79c0ff;
            --header-grad-start: #79c0ff;
            --header-grad-end: #a5d6ff;
            --profile-bg: #161b22;
            --skeleton-bg: #21262d;
            --skeleton-glow: #30363d;
            --badge-archived: #d29922;
            --gold-star: #e3b341;
            --devil-trident: #e06c75;
        }

        body.light {
            --bg-body: #f6f8fa;
            --bg-card: #ffffff;
            --text-primary: #1f2328;
            --text-secondary: #656d76;
            --border: #d0d7de;
            --border-hover: #0969da;
            --input-bg: #ffffff;
            --btn-bg: #f6f8fa;
            --btn-hover: #eaeef2;
            --accent: #0969da;
            --header-grad-start: #0969da;
            --header-grad-end: #1f7b4d;
            --profile-bg: #ffffff;
            --skeleton-bg: #eaeef2;
            --skeleton-glow: #d0d7de;
            --badge-archived: #b8860b;
            --gold-star: #d4af37;
            --devil-trident: #b93b4d;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--bg-body);
            color: var(--text-primary);
            font-family: 'VT323', monospace;
            padding: 2rem 1rem;
            transition: background 0.2s, color 0.2s;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        body.zen .site-header,
        body.zen .profile-section,
        body.zen footer {
            display: none;
        }

        .site-header {
            text-align: center;
            margin-bottom: 1rem;
        }

        .site-header h1 {
            font-size: 2rem;
            font-weight: 600;
            font-family: 'Bangers', cursive;
            background: linear-gradient(135deg, var(--header-grad-start), var(--header-grad-end));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .sub {
            color: #0f0;
            text-transform: uppercase;
            margin-top: 0.3rem;
            font-family: 'Luckiest Guy', sans-serif;
            font-weight: bold;
            text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.5), -0.05em -0.025em 0 rgba(0, 255, 255, 0.5);
            animation: glitch 0.6s infinite alternate;
            letter-spacing: 1px;
        }

        @keyframes glitch {
            0% {
                text-shadow: -2px 0 red, 2px 0 cyan;
                transform: skew(0deg);
            }
            25% {
                text-shadow: 2px 0 red, -2px 0 cyan;
                transform: skew(0.5deg);
            }
            50% {
                text-shadow: -2px 0 red, 2px 0 cyan;
                transform: skew(-0.5deg);
            }
            100% {
                text-shadow: 2px 0 red, -2px 0 cyan;
                transform: skew(0deg);
            }
        }

        .profile-section {
            background: var(--profile-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 1rem;
            justify-content: space-between;
        }

        .profile-left {
            display: flex;
            align-items: center;
            gap: 1.2rem;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            object-fit: cover;
        }

        .profile-info {
            display: flex;
            flex-direction: column;
        }

        .profile-name {
            font-size: 1.2rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .profile-bio {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .profile-location {
            font-size: 0.75rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.3rem;
            margin-top: 0.2rem;
        }

        .profile-contacts {
            display: flex;
            gap: 0.5rem;
        }

        .contact-icon {
            background: var(--btn-bg);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 0.4rem 0.9rem;
            font-size: 0.8rem;
            text-decoration: none;
            color: var(--text-primary);
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            transition: 0.2s;
        }

        .contact-icon:hover {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .search-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .search-box {
            flex: 2;
            min-width: 180px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.6rem 1rem;
            color: var(--text-primary);
            font-size: 0.9rem;
            font-family: inherit;
        }

        .filter-sort {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .filter-sort select {
            background: var(--btn-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.6rem 0.8rem;
            color: var(--text-primary);
            font-size: 0.8rem;
            cursor: pointer;
            font-family: inherit;
        }

        .action-buttons {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .action-btn {
            background: var(--btn-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.6rem 0.9rem;
            cursor: pointer;
            color: var(--text-primary);
            font-size: 1rem;
            transition: 0.2s;
            font-family: inherit;
        }

        .info {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .repo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .repo-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.2rem;
            transition: 0.2s;
            animation: fadeInUp 0.3s ease forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .repo-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-2px);
        }

        .repo-name {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.5rem;
        }

        .repo-name a {
            color: var(--accent);
            text-decoration: none;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .copy-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.2s;
            padding: 0.3rem 0.6rem;
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-family: 'VT323', monospace;
        }

        .copy-btn:hover {
            background: var(--btn-hover);
            color: var(--accent);
        }

        .repo-desc {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.8rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .repo-meta {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            flex-wrap: wrap;
        }

        .repo-meta .fa-star,
        .footer-stats .fa-star {
            color: var(--gold-star);
            text-shadow: 0 0 2px rgba(227,179,65,0.5);
        }

        .devil-fork {
            font-size: 0.9rem;
            filter: brightness(0) saturate(100%) invert(35%) sepia(98%) saturate(2500%) hue-rotate(332deg) brightness(98%) contrast(105%);
            color: #e06c75;
            display: inline-block;
        }
        .repo-meta span:hover .devil-fork {
        	animation: devilSpin 0.4s ease-in-out;
        }
        @keyframes devilSpin {
        	0% { transform: rotate(0deg); filter: hue-rotate(0deg); }
        	100% { transform: rotate(360deg); filter: hue-rotate(20deg); }
        }
        
        .repo-meta .fa-database,
        .footer-stats .fa-database {
        	color: #58a6ff;  /
            filter: drop-shadow(0 0 1px rgba(88,166,255,0.4));
        }

        .language {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }

        .archived-badge {
            background: var(--badge-archived);
            color: #fff;
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }

        .skeleton-card {
            background: var(--skeleton-bg);
            border-radius: 12px;
            padding: 1.2rem;
            animation: pulse 1.2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% {
                opacity: 0.6;
            }
            50% {
                opacity: 1;
            }
            100% {
                opacity: 0.6;
            }
        }

        .skeleton-title {
            height: 20px;
            width: 70%;
            background: var(--skeleton-glow);
            border-radius: 6px;
            margin-bottom: 12px;
        }

        .skeleton-desc {
            height: 14px;
            width: 90%;
            background: var(--skeleton-glow);
            border-radius: 4px;
            margin-bottom: 8px;
        }

        .skeleton-meta {
            height: 14px;
            width: 60%;
            background: var(--skeleton-glow);
            border-radius: 4px;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        .page-btn,
        .page-num {
            background: var(--btn-bg);
            border: 1px solid var(--border);
            padding: 0.4rem 0.9rem;
            border-radius: 6px;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 0.85rem;
            font-family: inherit;
        }

        .page-btn:disabled {
            opacity: 0.5;
            cursor: default;
        }

        .page-num.active {
            background: var(--accent);
            color: #fff;
        }

        .back-to-top {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: var(--accent);
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: 0.2s;
            border: none;
            font-size: 1.2rem;
            z-index: 998;
        }

        .back-to-top.show {
            opacity: 1;
            visibility: visible;
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
            border-top: 1px solid var(--border);
            padding-top: 1rem;
        }

        .footer-stats {
            margin-top: 0.2rem;
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .error,
        .no-results {
            text-align: center;
            padding: 3rem;
        }
        
        .repo-meta span i {
            margin-right: 3px;
        }
        
        .size-badge {
            background: rgba(128,128,128,0.15);
            padding: 0.1rem 0.4rem;
            border-radius: 20px;
            font-size: 0.7rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="site-header">
        <h1><i class="fas fa-code-branch"></i> Jenderal92 / repositories</h1>
        <div class="sub"><i class="fas fa-crown"></i> "Cogo, Cogito, Cognosco"</div>
    </div>

    <div class="profile-section" id="profileSection">
        <div class="profile-left">
            <img id="profileAvatar" class="profile-avatar" src="https://github.com/Jenderal92.png" alt="avatar">
            <div class="profile-info">
                <div class="profile-name">
                    <span id="profileName">Jenderal92</span>
                </div>
                <div class="profile-bio" id="profileBio">Loading bio...</div>
                <div class="profile-location" id="profileLocation"><i class="fas fa-map-marker-alt"></i> <span>Loading...</span></div>
            </div>
        </div>
        <div class="profile-contacts">
            <a href="https://github.com/Jenderal92" target="_blank" class="contact-icon"><i class="fab fa-github"></i> GitHub</a>
            <a href="https://t.me/Shin_Code" target="_blank" class="contact-icon"><i class="fab fa-telegram"></i> Telegram</a>
            <a href="mailto:jenderal1337@gmail.com" class="contact-icon"><i class="fas fa-envelope"></i> Email</a>
        </div>
    </div>

    <div class="search-bar">
        <input type="text" id="searchInput" class="search-box" placeholder="Search repository... 🔍">
        <div class="filter-sort">
            <select id="langFilter"><option value="all">All languages</option></select>
            <select id="sortSelect">
                <option value="updated">🕒 Latest</option>
                <option value="name">📁 Name</option>
                <option value="stars">⭐ Stars</option>
            </select>
        </div>
        <div class="action-buttons">
            <button id="themeToggle" class="action-btn" title="Dark/Light mode"><i class="fas fa-moon"></i></button>
            <button id="zenToggle" class="action-btn" title="Zen mode"><i class="fas fa-eye-slash"></i></button>
        </div>
    </div>
    <div class="info" id="repoCountInfo"></div>

    <div id="repoContainer" class="repo-grid"></div>

    <div id="paginationControls" class="pagination"></div>

    <footer>
        <div><i class="fab fa-github"></i> Data from GitHub API • <span id="footerTotal"></span> • © <span id="currentYear"></span> Jenderal92</div>
        <div class="footer-stats" id="footerStats">
            <span><i class="fas fa-star"></i> Total stars: <span id="totalStarsAll">-</span></span>
            <span><span class="devil-fork">🔱</span> Total forks: <span id="totalForksAll">-</span></span>
            <span><i class="fas fa-database"></i> Total size: <span id="totalSizeAll">-</span> MB</span>
        </div>
    </footer>
</div>

<button id="backToTop" class="back-to-top"><i class="fas fa-arrow-up"></i></button>

<script>
    const GITHUB_USERNAME = "Jenderal92";
    const REPO_PER_PAGE = 9;
    let allRepos = [], filteredRepos = [], currentPage = 1, totalPages = 1;
    let currentSort = "updated", currentLang = "all";
    let totalStarsAll = 0, totalForksAll = 0, totalSizeMB = 0;

    const repoContainer = document.getElementById("repoContainer");
    const searchInput = document.getElementById("searchInput");
    const paginationDiv = document.getElementById("paginationControls");
    const repoCountInfo = document.getElementById("repoCountInfo");
    const footerTotal = document.getElementById("footerTotal");
    const totalStarsSpan = document.getElementById("totalStarsAll");
    const totalForksSpan = document.getElementById("totalForksAll");
    const totalSizeSpan = document.getElementById("totalSizeAll");
    const themeToggle = document.getElementById("themeToggle");
    const zenToggle = document.getElementById("zenToggle");
    const langFilter = document.getElementById("langFilter");
    const sortSelect = document.getElementById("sortSelect");
    const backToTop = document.getElementById("backToTop");

    function toggleZen() {
        document.body.classList.toggle("zen");
        localStorage.setItem("zenMode", document.body.classList.contains("zen") ? "true" : "false");
    }
    zenToggle.addEventListener("click", toggleZen);
    if (localStorage.getItem("zenMode") === "true") document.body.classList.add("zen");

    function initTheme() {
        if (localStorage.getItem("theme") === "light") {
            document.body.classList.add("light");
            themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
        } else {
            themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
        }
    }
    function toggleTheme() {
        if (document.body.classList.contains("light")) {
            document.body.classList.remove("light");
            localStorage.setItem("theme", "dark");
            themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
        } else {
            document.body.classList.add("light");
            localStorage.setItem("theme", "light");
            themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
        }
    }
    themeToggle.addEventListener("click", toggleTheme);
    initTheme();

    function showSkeletonLoader() {
        let skeletons = "";
        for (let i = 0; i < REPO_PER_PAGE; i++) {
            skeletons += `
                <div class="skeleton-card">
                    <div class="skeleton-title"></div>
                    <div class="skeleton-desc"></div>
                    <div class="skeleton-desc" style="width: 80%;"></div>
                    <div class="skeleton-meta"></div>
                </div>
            `;
        }
        repoContainer.innerHTML = skeletons;
    }

    async function fetchUserProfile() {
        try {
            const res = await fetch(`https://api.github.com/users/${GITHUB_USERNAME}`);
            if (res.ok) {
                const data = await res.json();
                document.getElementById("profileAvatar").src = data.avatar_url || `https://github.com/${GITHUB_USERNAME}.png`;
                document.getElementById("profileName").innerText = data.name || GITHUB_USERNAME;
                document.getElementById("profileBio").innerHTML = data.bio || "No bio available";
                document.getElementById("profileLocation").querySelector("span").innerText = data.location || "Unknown";
            }
        } catch(e) { }
    }

    async function fetchAllRepos() {
        let page = 1, all = [];
        while (true) {
            const url = `https://api.github.com/users/${GITHUB_USERNAME}/repos?sort=updated&per_page=100&page=${page}`;
            const res = await fetch(url);
            if (!res.ok) throw new Error(`No matching repositories.`);
            const data = await res.json();
            if (data.length === 0) break;
            all = all.concat(data);
            if (data.length < 100) break;
            page++;
        }
        return all;
    }

    function computeTotalStats(repos) {
        let stars = 0, forks = 0, totalSizeKB = 0;
        for (const repo of repos) {
            stars += repo.stargazers_count;
            forks += repo.forks_count;
            totalSizeKB += repo.size || 0;
        }
        totalStarsAll = stars;
        totalForksAll = forks;
        totalSizeMB = (totalSizeKB / 1024).toFixed(2);
        totalStarsSpan.innerText = totalStarsAll;
        totalForksSpan.innerText = totalForksAll;
        totalSizeSpan.innerText = totalSizeMB;
    }

    function populateLangFilter(repos) {
        const langs = new Set();
        for (const repo of repos) if (repo.language) langs.add(repo.language);
        const sorted = Array.from(langs).sort();
        langFilter.innerHTML = '<option value="all">All languages</option>';
        for (const lang of sorted) langFilter.innerHTML += `<option value="${lang}">${lang}</option>`;
    }

    function sortRepos(repos, sortBy) {
        const arr = [...repos];
        if (sortBy === "name") arr.sort((a, b) => a.name.localeCompare(b.name));
        else if (sortBy === "stars") arr.sort((a, b) => b.stargazers_count - a.stargazers_count);
        else arr.sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at));
        return arr;
    }

    function applyFilterAndSort() {
        let filtered = [...allRepos];
        const keyword = searchInput.value.trim().toLowerCase();
        if (keyword) filtered = filtered.filter(r => r.name.toLowerCase().includes(keyword));
        if (currentLang !== "all") filtered = filtered.filter(r => r.language === currentLang);
        filtered = sortRepos(filtered, currentSort);
        filteredRepos = filtered;
        totalPages = Math.ceil(filteredRepos.length / REPO_PER_PAGE) || 1;
        currentPage = 1;
        renderCurrentPage();
        renderPagination();
    }

    function getLangIcon(lang) {
        if (!lang) return '<i class="fas fa-archive"></i>';
        const l = lang.toLowerCase();
        const map = {
            'python': '<i class="fab fa-python" style="color:#3572A5;"></i>',
            'php': '<i class="fab fa-php" style="color:#777BB4;"></i>',
            'javascript': '<i class="fab fa-js" style="color:#f1e05a;"></i>',
            'typescript': '<i class="fab fa-js" style="color:#3178c6;"></i>',
            'html': '<i class="fab fa-html5" style="color:#e34c26;"></i>',
            'css': '<i class="fab fa-css3-alt" style="color:#563d7c;"></i>',
            'java': '<i class="fab fa-java" style="color:#b07219;"></i>',
            'go': '<i class="fab fa-golang" style="color:#00ADD8;"></i>',
        };
        for (let [k, v] of Object.entries(map)) if (l.includes(k)) return v;
        return '<i class="fas fa-code"></i>';
    }

    function formatSizeMB(sizeKB) {
        if (!sizeKB && sizeKB !== 0) return "0";
        const mb = sizeKB / 1024;
        return mb.toFixed(2);
    }

    async function handleCopy(buttonElement, urlToCopy) {
        const originalHTML = buttonElement.innerHTML;
        const setTempAndReset = (iconHtml, text) => {
            buttonElement.innerHTML = `${iconHtml} ${text}`;
            setTimeout(() => {
                buttonElement.innerHTML = originalHTML;
            }, 1500);
        };

        try {
            await navigator.clipboard.writeText(urlToCopy);
            setTempAndReset('<i class="fas fa-check-circle"></i>', 'Copied!');
        } catch (err) {
            let success = false;
            const textarea = document.createElement("textarea");
            textarea.value = urlToCopy;
            textarea.style.position = "fixed";
            textarea.style.top = "-9999px";
            textarea.style.left = "-9999px";
            document.body.appendChild(textarea);
            textarea.select();
            try {
                success = document.execCommand("copy");
            } catch (e) { }
            document.body.removeChild(textarea);

            if (success) {
                setTempAndReset('<i class="fas fa-check-circle"></i>', 'Copied!');
            } else {
                setTempAndReset('<i class="fas fa-exclamation-triangle"></i>', 'Failed');
            }
        }
    }

    function renderCurrentPage() {
        if (!filteredRepos.length) {
            repoContainer.innerHTML = `<div class="no-results">📭 No matching repositories.</div>`;
            repoCountInfo.innerHTML = `0 results`;
            footerTotal.innerText = `total 0 repos`;
            return;
        }
        const start = (currentPage - 1) * REPO_PER_PAGE;
        const end = start + REPO_PER_PAGE;
        const pageRepos = filteredRepos.slice(start, end);
        let html = "";
        for (const repo of pageRepos) {
            const sizeMB = formatSizeMB(repo.size);
            html += `
                <div class="repo-card">
                    <div class="repo-name">
                        <a href="${repo.html_url}" target="_blank" rel="noopener noreferrer">${repo.name}</a>
                        <button class="copy-btn" data-url="${repo.html_url}" title="Copy repository URL"><i class="fas fa-copy"></i> <span class="copy-text">Copy</span></button>
                    </div>
                    <div class="repo-desc">${repo.description || "No description"}</div>
                    <div class="repo-meta">
                        <span class="language">${getLangIcon(repo.language)} ${repo.language || "Unknown"}</span>
                        <span><i class="fas fa-star"></i> ${repo.stargazers_count}</span>
                        <span><span class="devil-fork">🔱</span> ${repo.forks_count}</span>
                        <span><i class="fas fa-database"></i> ${sizeMB} MB</span>
                        ${repo.archived ? '<span class="archived-badge"><i class="fas fa-archive"></i> Archived</span>' : ''}
                    </div>
                </div>
            `;
        }
        repoContainer.innerHTML = html;
        repoCountInfo.innerHTML = `Showing ${start + 1}-${Math.min(end, filteredRepos.length)} of ${filteredRepos.length} repos`;
        footerTotal.innerText = `total ${filteredRepos.length} repos (from ${allRepos.length} public)`;

        document.querySelectorAll(".copy-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                const url = btn.getAttribute("data-url");
                if (url) {
                    handleCopy(btn, url);
                } else {
                    const orig = btn.innerHTML;
                    btn.innerHTML = '<i class="fas fa-ban"></i> Error';
                    setTimeout(() => { btn.innerHTML = orig; }, 1200);
                }
            });
        });
    }

    function renderPagination() {
        if (totalPages <= 1) {
            paginationDiv.innerHTML = "";
            return;
        }
        let btns = `<button class="page-btn" id="prevPage" ${currentPage === 1 ? 'disabled' : ''}><i class="fas fa-chevron-left"></i> Prev</button>`;
        let start = Math.max(1, currentPage - 2), end = Math.min(totalPages, currentPage + 2);
        if (end - start < 4) {
            if (start === 1) end = Math.min(totalPages, start + 4);
            else if (end === totalPages) start = Math.max(1, end - 4);
        }
        if (start > 1) {
            btns += `<button class="page-num" data-page="1">1</button>`;
            if (start > 2) btns += `<span>...</span>`;
        }
        for (let i = start; i <= end; i++) btns += `<button class="page-num ${currentPage === i ? 'active' : ''}" data-page="${i}">${i}</button>`;
        if (end < totalPages) {
            if (end < totalPages - 1) btns += `<span>...</span>`;
            btns += `<button class="page-num" data-page="${totalPages}">${totalPages}</button>`;
        }
        btns += `<button class="page-btn" id="nextPage" ${currentPage === totalPages ? 'disabled' : ''}>Next <i class="fas fa-chevron-right"></i></button>`;
        paginationDiv.innerHTML = btns;

        document.getElementById("prevPage")?.addEventListener("click", () => {
            if (currentPage > 1) {
                currentPage--;
                renderCurrentPage();
                renderPagination();
            }
        });
        document.getElementById("nextPage")?.addEventListener("click", () => {
            if (currentPage < totalPages) {
                currentPage++;
                renderCurrentPage();
                renderPagination();
            }
        });
        document.querySelectorAll(".page-num").forEach(btn => {
            btn.addEventListener("click", () => {
                let p = parseInt(btn.dataset.page);
                if (!isNaN(p) && p !== currentPage) {
                    currentPage = p;
                    renderCurrentPage();
                    renderPagination();
                }
            });
        });
    }

    window.addEventListener("scroll", () => {
        if (window.scrollY > 300) backToTop.classList.add("show");
        else backToTop.classList.remove("show");
    });
    backToTop.addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));

    async function init() {
        showSkeletonLoader();
        try {
            const [repos] = await Promise.all([fetchAllRepos(), fetchUserProfile()]);
            allRepos = repos.filter(r => !r.fork);
            allRepos.sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at));
            computeTotalStats(allRepos);
            populateLangFilter(allRepos);
            filteredRepos = [...allRepos];
            totalPages = Math.ceil(filteredRepos.length / REPO_PER_PAGE) || 1;
            currentPage = 1;
            renderCurrentPage();
            renderPagination();
        } catch (err) {
            repoContainer.innerHTML = `<div class="error">❌ ${err.message}</div>`;
        }
    }

    searchInput.addEventListener("input", applyFilterAndSort);
    langFilter.addEventListener("change", (e) => {
        currentLang = e.target.value;
        applyFilterAndSort();
    });
    sortSelect.addEventListener("change", (e) => {
        currentSort = e.target.value;
        applyFilterAndSort();
    });
    document.getElementById("currentYear").innerText = new Date().getFullYear();

    init();
</script>
</body>
</html>
